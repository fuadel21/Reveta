name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      PAYPAL_CLIENT_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
      PAYPAL_CLIENT_SECRET: ${{ secrets.PAYPAL_CLIENT_SECRET }}
      PAYPAL_ENVIRONMENT: ${{ secrets.PAYPAL_ENVIRONMENT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        shell: bash
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "Missing SUPABASE_ACCESS_TOKEN" && exit 1)
          test -n "$SUPABASE_PROJECT_REF" || (echo "Missing SUPABASE_PROJECT_REF" && exit 1)
          test -n "$STRIPE_SECRET_KEY" || (echo "Missing STRIPE_SECRET_KEY" && exit 1)
          test -n "$PAYPAL_CLIENT_ID" || (echo "Missing PAYPAL_CLIENT_ID" && exit 1)
          test -n "$PAYPAL_CLIENT_SECRET" || (echo "Missing PAYPAL_CLIENT_SECRET" && exit 1)

      - name: Set Supabase secrets
        run: |
          supabase secrets set STRIPE_SECRET_KEY="$STRIPE_SECRET_KEY" --project-ref "$SUPABASE_PROJECT_REF"
          supabase secrets set PAYPAL_CLIENT_ID="$PAYPAL_CLIENT_ID" --project-ref "$SUPABASE_PROJECT_REF"
          supabase secrets set PAYPAL_CLIENT_SECRET="$PAYPAL_CLIENT_SECRET" --project-ref "$SUPABASE_PROJECT_REF"
          supabase secrets set PAYPAL_ENVIRONMENT="${PAYPAL_ENVIRONMENT:-sandbox}" --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy payment functions
        run: |
          supabase functions deploy create-payment-intent --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy create-paypal-order --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy capture-paypal-order --project-ref "$SUPABASE_PROJECT_REF"
