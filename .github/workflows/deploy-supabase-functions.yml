name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      SENDCLOUD_PUBLIC_KEY: ${{ secrets.SENDCLOUD_PUBLIC_KEY }}
      SENDCLOUD_SECRET_KEY: ${{ secrets.SENDCLOUD_SECRET_KEY }}
      SENDCLOUD_SHIPPING_METHOD_ID: ${{ secrets.SENDCLOUD_SHIPPING_METHOD_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        shell: bash
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "Missing SUPABASE_ACCESS_TOKEN" && exit 1)
          test -n "$SUPABASE_PROJECT_REF" || (echo "Missing SUPABASE_PROJECT_REF" && exit 1)
          test -n "$STRIPE_SECRET_KEY" || (echo "Missing STRIPE_SECRET_KEY" && exit 1)

      - name: Set Supabase secrets
        run: |
          supabase secrets set STRIPE_SECRET_KEY="$STRIPE_SECRET_KEY" --project-ref "$SUPABASE_PROJECT_REF"
          if [ -n "$SENDCLOUD_PUBLIC_KEY" ] && [ -n "$SENDCLOUD_SECRET_KEY" ]; then
            supabase secrets set SENDCLOUD_PUBLIC_KEY="$SENDCLOUD_PUBLIC_KEY" --project-ref "$SUPABASE_PROJECT_REF"
            supabase secrets set SENDCLOUD_SECRET_KEY="$SENDCLOUD_SECRET_KEY" --project-ref "$SUPABASE_PROJECT_REF"
            if [ -n "$SENDCLOUD_SHIPPING_METHOD_ID" ]; then
              supabase secrets set SENDCLOUD_SHIPPING_METHOD_ID="$SENDCLOUD_SHIPPING_METHOD_ID" --project-ref "$SUPABASE_PROJECT_REF"
            fi
          else
            echo "Sendcloud secrets not set. Skipping Sendcloud secret configuration."
          fi

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy create-payment-intent --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy create-sendcloud-parcel --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy geocode-location --project-ref "$SUPABASE_PROJECT_REF"
